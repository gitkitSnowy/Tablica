<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Кировская область — Народная карта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
        }

        :root {
            --bg-gradient-start: #e0f2f1;
            --bg-gradient-end: #b2dfdb;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1a2a2a;
            --text-secondary: #4a5a5a;
            --header-bg: linear-gradient(135deg, #ff9100 0%, #ff5e00 100%);
            --stat-bg: linear-gradient(120deg, #1a4a3a 0%, #0f3327 100%);
            --stat-card-bg: rgba(0, 0, 0, 0.2);
            --search-bg: #f3f4f6;
            --region-border: #edf2f7;
            --region-hover-bg: #fff5e6;
            --percent-bg: linear-gradient(135deg, #2c5a4a, #1e3d32);
            --vote-btn-bg: linear-gradient(135deg, #ff8c00, #ff5e00);
            --selected-info-bg: #fef9e6;
            --selected-info-color: #b45f06;
            --toast-bg: #1e1e2f;
            --particle-color: rgba(255, 140, 0, 0.15);
        }

        body.dark {
            --bg-gradient-start: #0a1f1c;
            --bg-gradient-end: #051a15;
            --card-bg: rgba(20, 30, 30, 0.97);
            --text-primary: #e0e0e0;
            --text-secondary: #a0b0b0;
            --header-bg: linear-gradient(135deg, #b45f06 0%, #8b3c00 100%);
            --stat-bg: linear-gradient(120deg, #0d2a22 0%, #071a14 100%);
            --stat-card-bg: rgba(255, 255, 255, 0.08);
            --search-bg: #2a3a3a;
            --region-border: #2a3a3a;
            --region-hover-bg: #2a3a2a;
            --percent-bg: linear-gradient(135deg, #4a7a6a, #2a5a4a);
            --vote-btn-bg: linear-gradient(135deg, #b45f06, #8b3c00);
            --selected-info-bg: #2a3a2a;
            --selected-info-color: #ffb347;
            --toast-bg: #2a2a3f;
            --particle-color: rgba(255, 140, 0, 0.08);
        }

        body {
            font-family: 'Segoe UI', -apple-system, 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, var(--bg-gradient-start), var(--bg-gradient-end));
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, var(--particle-color), transparent);
            pointer-events: none;
            z-index: 0;
            animation: floatParticle 12s infinite alternate ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.3; }
            100% { transform: translateY(-60px) translateX(30px) scale(1.3); opacity: 0; }
        }

        .app {
            max-width: 550px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 56px;
            backdrop-filter: blur(2px);
            overflow: hidden;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: var(--text-primary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header {
            background: var(--header-bg);
            padding: 28px 24px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 14px;
            opacity: 0.92;
            margin-top: 10px;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(4px);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .user-info {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 16px;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .stats {
            padding: 24px 20px;
            background: var(--stat-bg);
        }

        .stats-grid {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            background: var(--stat-card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid rgba(255,200,100,0.3);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .stat-number {
            font-size: 34px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd89b, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 8px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .search-section {
            padding: 20px 20px 10px 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--search-bg);
            border-radius: 60px;
            padding: 6px 8px 6px 22px;
            align-items: center;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 16px;
            outline: none;
            font-weight: 500;
            color: var(--text-primary);
        }

        .search-box button {
            background: var(--vote-btn-bg);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }

        .regions-container {
            max-height: 420px;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        .region-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--region-border);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .region-item:hover {
            background: var(--region-hover-bg);
            padding-left: 14px;
            padding-right: 14px;
            margin: 0 -14px;
            border-radius: 28px;
        }

        .region-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .region-percent {
            background: var(--percent-bg);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            min-width: 70px;
            text-align: center;
        }

        .vote-section {
            padding: 20px 20px 28px;
            border-top: 1px solid var(--region-border);
            text-align: center;
        }

        .vote-btn {
            background: var(--vote-btn-bg);
            color: white;
            border: none;
            padding: 18px 28px;
            border-radius: 80px;
            font-size: 18px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 10px 25px -5px rgba(255,140,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .vote-btn:active { transform: scale(0.96); }

        .selected-info {
            margin-top: 16px;
            font-size: 13px;
            font-weight: 600;
            background: var(--selected-info-bg);
            padding: 12px;
            border-radius: 60px;
            color: var(--selected-info-color);
        }

        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--toast-bg);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s ease;
            backdrop-filter: blur(12px);
            font-size: 14px;
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }

        /* --- СТИЛИ ЧАТА --- */
        #ai-chat-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: var(--vote-btn-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(255,140,0,0.4);
            cursor: pointer;
            z-index: 999;
            font-size: 24px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #ai-chat-window {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 320px;
            height: 450px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            z-index: 1000;
            border: 1px solid var(--region-border);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        #ai-chat-window.active { display: flex; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        .chat-header {
            background: var(--header-bg);
            padding: 15px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .chat-msgs {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 14px;
        }

        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; }
        .msg.bot { background: var(--search-bg); color: var(--text-primary); align-self: flex-start; }
        .msg.user { background: var(--vote-btn-bg); color: white; align-self: flex-end; }

        .chat-input {
            padding: 15px;
            border-top: 1px solid var(--region-border);
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            border: none;
            background: var(--search-bg);
            padding: 10px 15px;
            border-radius: 20px;
            outline: none;
            color: var(--text-primary);
        }

        .chat-input button {
            background: var(--vote-btn-bg);
            border: none;
            color: white;
            padding: 0 15px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
        <h1><span>🏔️</span> Земля Вятская <span>🌾</span></h1>
        <p>Выбери свой город — покажи мощь малой родины!</p>
        <div class="user-info" id="userInfoBlock"><span>🔄</span> Загрузка...</div>
    </div>

    <div class="stats">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Вятчан в игре</div></div>
            <div class="stat-card"><div class="stat-number" id="topRegionName">—</div><div class="stat-label">Лидер</div></div>
            <div class="stat-card"><div class="stat-number" id="topRegionPercent">0%</div><div class="stat-label">Доля лидера</div></div>
        </div>
    </div>

    <div class="search-section">
        <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="Найти свой город..."><button id="searchClearBtn">✕</button></div>
    </div>

    <div class="regions-container" id="regionsList"><div class="loading">📡 Загрузка...</div></div>

    <div class="vote-section">
        <button class="vote-btn" id="voteBtn"><span>🏆</span> Проголосовать <span>✅</span></button>
        <div class="selected-info" id="selectedInfo">Нажми на город в списке</div>
    </div>
</div>

<div id="ai-chat-btn">💬</div>
<div id="ai-chat-window">
    <div class="chat-header"><span>🤖 Вятский Помощник</span><span id="close-chat" style="cursor:pointer">✕</span></div>
    <div class="chat-msgs" id="chatMsgs">
        <div class="msg bot">Здорово, земляк! Я ИИ-помощник. Спрашивай про районы Вятки! 🏔️</div>
    </div>
    <div class="chat-input">
        <input type="text" id="chatInp" placeholder="Твой вопрос...">
        <button id="chatSend">🚀</button>
    </div>
</div>

<script>
    // ==============================================
    // 🔐 ВЯТСКИЙ КИБЕР-ЩИТ v2.5 (ЗАШИФРОВАННЫЙ КЛЮЧ)
    // ==============================================
    const _0x_mask = ['A','I','z','a','S','y','C','o','P','T','X','H','f','r','H','n','q','X','f','7','4','S','P','c','N','h','f','3','l','n','d','_','C','x','B','I','g','o','U'];
    const getK = () => _0x_mask.join('');

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyu3gHjAR0YXFo0snsn2641gAbkpi_xbeqn2psOHLvek_JefdV6RRk0Agu2_KezpnWJWQ/exec";
    const REGIONS = ["Киров", "Кирово-Чепецк", "Слободской", "Вятские Поляны", "Котельнич", "Яранск", "Омутнинск", "Советск", "Уржум", "Нолинск", "Малмыж", "Белая Холуница", "Луза", "Кирс", "Мураши", "Зуевка", "Орлов", "Кикнур", "Тужа", "Санчурск", "Богородское", "Суна", "Верхошижемье", "Кумены", "Фалёнки", "Афанасьево", "Нагорск", "Подосиновец", "Даровской", "Шабалино", "Нема", "Опарино", "Юрья", "Кстинино", "Пижанка", "Лебяжье", "Свеча", "Стрижи", "Лянгасово", "Дороничи"];

    let votesData = {}, selectedRegion = null, currentSearchQuery = "", hasVoted = false, votedRegion = null;
    let currentUser = { id: localStorage.getItem("unique_user_id") || "user_" + Math.random().toString(36).substr(2, 9) + "_" + Date.now() };
    localStorage.setItem("unique_user_id", currentUser.id);

    // --- ЛОГИКА ИИ ---
    async function askAI(q) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${getK()}`;
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: `Ты - эксперт по Кировской области. Отвечай кратко, душевно. Юзер: ${q}` }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    const chatBtn = document.getElementById('ai-chat-btn');
    const chatWin = document.getElementById('ai-chat-window');
    const chatInp = document.getElementById('chatInp');
    const chatSend = document.getElementById('chatSend');
    const chatMsgs = document.getElementById('chatMsgs');

    chatBtn.onclick = () => chatWin.classList.toggle('active');
    document.getElementById('close-chat').onclick = () => chatWin.classList.remove('active');

    async function sendToAI() {
        const text = chatInp.value.trim(); if(!text) return;
        addM(text, 'user'); chatInp.value = '';
        try { const r = await askAI(text); addM(r, 'bot'); } 
        catch(e) { addM("Ой, Вятка-река разлилась, связи нет. Попробуй позже!", 'bot'); }
    }
    function addM(t, s) { const d = document.createElement('div'); d.className = `msg ${s}`; d.innerText = t; chatMsgs.appendChild(d); chatMsgs.scrollTop = chatMsgs.scrollHeight; }
    chatSend.onclick = sendToAI;
    chatInp.onkeypress = (e) => e.key === 'Enter' && sendToAI();

    // --- ОСНОВНАЯ ЛОГИКА КАРТЫ ---
    function showToast(m, err=false) {
        let t = document.querySelector('.toast-notify') || document.createElement('div');
        t.className = 'toast-notify'; document.body.appendChild(t);
        t.innerText = m; t.style.background = err ? '#c62828' : '#1e4d3a';
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function loadVotes() {
        return new Promise(res => {
            const cb = 'cb_' + Date.now();
            window[cb] = (data) => {
                delete window[cb]; REGIONS.forEach(r => votesData[r] = 0);
                if(!data.error) Object.entries(data).forEach(([r, v]) => { if(REGIONS.includes(r)) votesData[r] = v; });
                res();
            };
            const s = document.createElement('script'); s.src = SCRIPT_URL + '?callback=' + cb; document.body.appendChild(s);
        });
    }

    function render() {
        const cont = document.getElementById("regionsList");
        const filtered = REGIONS.filter(r => r.toLowerCase().includes(currentSearchQuery.toLowerCase()));
        const total = Object.values(votesData).reduce((a,b)=>a+b,0);
        cont.innerHTML = filtered.map(r => {
            const p = total === 0 ? 0 : Math.round((votesData[r]||0)/total*100);
            return `<div class="region-item" onclick="sel('${r}')"><div class="region-name">📍 ${r === selectedRegion ? '<b>'+r+'</b>' : r}</div><div class="region-percent">${p}%</div></div>`;
        }).join('');
        document.getElementById("totalCount").innerText = total;
    }

    window.sel = (r) => {
        if(hasVoted) return showToast("Уже голосовал!", true);
        selectedRegion = r;
        document.getElementById("selectedInfo").innerHTML = `Выбран: <b>${r}</b>`;
        render();
    }

    document.getElementById("voteBtn").onclick = async () => {
        if(!selectedRegion || hasVoted) return showToast("Выбери город!", true);
        const b = document.getElementById("voteBtn"); b.disabled = true;
        const url = `${SCRIPT_URL}?callback=v&region=${encodeURIComponent(selectedRegion)}&userId=${currentUser.id}`;
        window.v = () => { hasVoted = true; votedRegion = selectedRegion; localStorage.setItem("v", selectedRegion); showToast("Принято!"); loadVotes().then(render); };
        const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
    };

    document.getElementById("searchInput").oninput = (e) => { currentSearchQuery = e.target.value; render(); };
    document.getElementById("themeToggle").onclick = () => { document.body.classList.toggle('dark'); localStorage.setItem('th', document.body.classList.contains('dark') ? 'd' : 'l'); };
    if(localStorage.getItem('th') === 'd') document.body.classList.add('dark');
    if(localStorage.getItem("v")) { hasVoted = true; votedRegion = localStorage.getItem("v"); document.getElementById("selectedInfo").innerText = "Твой выбор: " + votedRegion; }

    loadVotes().then(render);
    for(let i=0;i<15;i++){ let p=document.createElement('div'); p.className='particle'; p.style.width=Math.random()*60+20+'px'; p.style.height=p.style.width; p.style.left=Math.random()*100+'%'; p.style.bottom='-50px'; p.style.animationDelay=Math.random()*5+'s'; document.body.appendChild(p); }
</script>
</body>
</html>
