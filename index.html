<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Кировская область — Народная карта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
        }

        :root {
            --bg-gradient-start: #e0f2f1;
            --bg-gradient-end: #b2dfdb;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1a2a2a;
            --text-secondary: #4a5a5a;
            --header-bg: linear-gradient(135deg, #ff9100 0%, #ff5e00 100%);
            --stat-bg: linear-gradient(120deg, #1a4a3a 0%, #0f3327 100%);
            --stat-card-bg: rgba(0, 0, 0, 0.2);
            --search-bg: #f3f4f6;
            --region-border: #edf2f7;
            --region-hover-bg: #fff5e6;
            --percent-bg: linear-gradient(135deg, #2c5a4a, #1e3d32);
            --vote-btn-bg: linear-gradient(135deg, #ff8c00, #ff5e00);
            --selected-info-bg: #fef9e6;
            --selected-info-color: #b45f06;
            --toast-bg: #1e1e2f;
            --particle-color: rgba(255, 140, 0, 0.15);
        }

        body.dark {
            --bg-gradient-start: #0a1f1c;
            --bg-gradient-end: #051a15;
            --card-bg: rgba(20, 30, 30, 0.97);
            --text-primary: #e0e0e0;
            --text-secondary: #a0b0b0;
            --header-bg: linear-gradient(135deg, #b45f06 0%, #8b3c00 100%);
            --stat-bg: linear-gradient(120deg, #0d2a22 0%, #071a14 100%);
            --stat-card-bg: rgba(255, 255, 255, 0.08);
            --search-bg: #2a3a3a;
            --region-border: #2a3a3a;
            --region-hover-bg: #2a3a2a;
            --percent-bg: linear-gradient(135deg, #4a7a6a, #2a5a4a);
            --vote-btn-bg: linear-gradient(135deg, #b45f06, #8b3c00);
            --selected-info-bg: #2a3a2a;
            --selected-info-color: #ffb347;
            --toast-bg: #2a2a3f;
            --particle-color: rgba(255, 140, 0, 0.08);
        }

        body {
            font-family: 'Segoe UI', -apple-system, 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, var(--bg-gradient-start), var(--bg-gradient-end));
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, var(--particle-color), transparent);
            pointer-events: none;
            z-index: 0;
            animation: floatParticle 12s infinite alternate ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.3; }
            100% { transform: translateY(-60px) translateX(30px) scale(1.3); opacity: 0; }
        }

        .app {
            max-width: 550px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 56px;
            backdrop-filter: blur(2px);
            overflow: hidden;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: var(--text-primary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header {
            background: var(--header-bg);
            padding: 28px 24px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: shine 8s infinite linear;
            transform: rotate(25deg);
        }

        @keyframes shine {
            0% { transform: translateX(-30%) translateY(-30%) rotate(25deg); }
            100% { transform: translateX(30%) translateY(30%) rotate(25deg); }
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 14px;
            opacity: 0.92;
            margin-top: 10px;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(4px);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .user-info {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 16px;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .stats {
            padding: 24px 20px;
            background: var(--stat-bg);
        }

        .stats-grid {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            background: var(--stat-card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid rgba(255,200,100,0.3);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #ffb347;
        }

        .stat-number {
            font-size: 34px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd89b, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 8px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .search-section {
            padding: 20px 20px 10px 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--search-bg);
            border-radius: 60px;
            padding: 6px 8px 6px 22px;
            align-items: center;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .search-box:focus-within {
            border-color: #ff8c00;
            box-shadow: 0 0 0 4px rgba(255,140,0,0.15);
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 16px;
            outline: none;
            font-weight: 500;
            color: var(--text-primary);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box button {
            background: var(--vote-btn-bg);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
        }

        .regions-container {
            max-height: 420px;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        .region-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--region-border);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .region-item:hover {
            background: var(--region-hover-bg);
            padding-left: 14px;
            padding-right: 14px;
            margin: 0 -14px;
            border-radius: 28px;
        }

        .region-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .region-percent {
            background: var(--percent-bg);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            min-width: 70px;
            text-align: center;
        }

        .vote-section {
            padding: 20px 20px 28px;
            border-top: 1px solid var(--region-border);
            text-align: center;
        }

        .vote-btn {
            background: var(--vote-btn-bg);
            color: white;
            border: none;
            padding: 18px 28px;
            border-radius: 80px;
            font-size: 18px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 10px 25px -5px rgba(255,140,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .vote-btn:active { transform: scale(0.96); }
        .vote-btn.disabled, .vote-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .selected-info {
            margin-top: 16px;
            font-size: 13px;
            font-weight: 600;
            background: var(--selected-info-bg);
            padding: 12px;
            border-radius: 60px;
            color: var(--selected-info-color);
        }

        .already-voted {
            background: #2e7d32;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #ff8c00;
            font-weight: 600;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--toast-bg);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s ease;
            backdrop-filter: blur(12px);
            font-size: 14px;
            white-space: nowrap;
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
        <h1><span>🏔️</span> Земля Вятская <span>🌾</span></h1>
        <p>Выбери свой город — покажи мощь малой родины!</p>
        <div class="user-info" id="userInfoBlock"><span>🔄</span> Загрузка...</div>
    </div>

    <div class="stats">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Вятчан в игре</div></div>
            <div class="stat-card"><div class="stat-number" id="topRegionName">—</div><div class="stat-label">Лидер</div></div>
            <div class="stat-card"><div class="stat-number" id="topRegionPercent">0%</div><div class="stat-label">Доля лидера</div></div>
        </div>
    </div>

    <div class="search-section">
        <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="Найти свой город или район..."><button id="searchClearBtn">✕</button></div>
    </div>

    <div class="regions-container" id="regionsList"><div class="loading">📡 Загружаем карту Вятки...</div></div>

    <div class="vote-section">
        <button class="vote-btn" id="voteBtn"><span>🏆</span> Проголосовать <span>✅</span></button>
        <div class="selected-info" id="selectedInfo">Нажми на любой город в списке</div>
    </div>
</div>

<script>
    // ==============================================
    // ТВОЯ ССЫЛКА НА APPS SCRIPT
    // ==============================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxdFvYh9aI2VB8JmE5BN0yfkZztV17AakybMmX_kiLo7qpbosFwEP9JQVb4e0qKjjsoA/exec";
    
    const REGIONS = [
        "Киров", "Кирово-Чепецк", "Слободской", "Вятские Поляны", "Котельнич",
        "Яранск", "Омутнинск", "Советск", "Уржум", "Нолинск", "Малмыж",
        "Белая Холуница", "Луза", "Кирс", "Мураши", "Зуевка", "Орлов",
        "Кикнур", "Тужа", "Санчурск", "Богородское", "Суна", "Верхошижемье",
        "Кумены", "Фалёнки", "Афанасьево", "Нагорск", "Подосиновец", "Даровской",
        "Шабалино", "Нема", "Опарино", "Юрья", "Кстинино", "Пижанка",
        "Лебяжье", "Свеча", "Стрижи", "Лянгасово", "Дороничи"
    ];

    let votesData = {};
    let selectedRegion = null;
    let currentSearchQuery = "";
    let currentUser = { id: null, name: "Кировчанин" };
    let hasVoted = false;
    let votedRegion = null;

    function showToast(message, isError = false) {
        let toast = document.querySelector('.toast-notify');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-notify';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.background = isError ? '#c62828' : '#1e4d3a';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Генерация УНИКАЛЬНОГО ID пользователя (создаётся 1 раз и сохраняется навсегда)
    function getOrCreateUniqueUserId() {
        let userId = localStorage.getItem("unique_user_id");
        if (!userId) {
            // Создаём уникальный ID: случайная строка + timestamp
            const randomPart = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 8);
            const timestamp = Date.now();
            userId = "user_" + randomPart + "_" + timestamp;
            localStorage.setItem("unique_user_id", userId);
            console.log("Создан новый уникальный ID:", userId);
        }
        return userId;
    }

    async function getUserInfo() {
        // Получаем уникальный ID (создаётся при первом заходе)
        const uniqueId = getOrCreateUniqueUserId();
        
        // Проверяем, голосовал ли уже этот пользователь
        const savedVote = localStorage.getItem(`vote_${uniqueId}`);
        if (savedVote) {
            const voteData = JSON.parse(savedVote);
            hasVoted = true;
            votedRegion = voteData.region;
            document.getElementById("selectedInfo").innerHTML = `🔒 Ты уже голосовал за ${votedRegion}`;
            document.getElementById("selectedInfo").classList.add('already-voted');
        }
        
        // Показываем пользователю его короткий ID (для информации)
        const shortId = uniqueId.slice(-12);
        document.getElementById("userInfoBlock").innerHTML = `<span>🆔</span> ID: ${shortId}`;
        
        currentUser.id = uniqueId;
        currentUser.name = "Кировчанин";
        
        return true;
    }

    async function loadVotesFromSheet() {
        try {
            const r = await fetch(SCRIPT_URL);
            const data = await r.json();
            REGIONS.forEach(r => votesData[r] = 0);
            if (!data.error) for (let [reg, votes] of Object.entries(data)) if (REGIONS.includes(reg)) votesData[reg] = votes;
            return true;
        } catch(e) { 
            console.error("Ошибка загрузки:", e);
            return false; 
        }
    }

    async function sendVoteToSheet(region) {
        const r = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                region, 
                userId: currentUser.id, 
                userName: currentUser.name,
                timestamp: new Date().toISOString()
            })
        });
        const res = await r.json();
        if (res.error === "already_voted") throw new Error(res.message);
        return true;
    }

    function getTotal() { return Object.values(votesData).reduce((a,b)=>a+b,0); }
    function getTop() {
        let top=null, max=-1;
        for(let [name,count] of Object.entries(votesData)) if(count>max) { max=count; top=name; }
        const total=getTotal();
        return { name: top, percent: total>0&&top ? Math.round(max/total*100) : 0 };
    }
    function animateValue(el, start, end, suf="") {
        if(!el) return;
        let cur=start, step=Math.ceil((end-start)/25);
        let timer=setInterval(()=>{
            cur+=step;
            if((step>0&&cur>=end)||(step<0&&cur<=end)) { cur=end; el.innerText=cur+suf; clearInterval(timer); }
            else el.innerText=cur+suf;
        },15);
    }

    function renderRegions() {
        const container = document.getElementById("regionsList");
        const search = currentSearchQuery.toLowerCase();
        let filtered = REGIONS.filter(r => !search || r.toLowerCase().includes(search));
        if(!filtered.length) { container.innerHTML='<div class="loading">😔 Ничего не найдено</div>'; return; }
        const total = getTotal();
        let html = "";
        for(let region of filtered) {
            const percent = total===0 ? 0 : Math.round((votesData[region]||0)/total*100);
            const selected = selectedRegion===region;
            let emoji = "📍";
            if(region==="Киров") emoji="🏙️";
            else if(region==="Кирово-Чепецк") emoji="🏭";
            else if(region.includes("ское")) emoji="🌾";
            const votedMark = (hasVoted && votedRegion===region) ? ' ✅' : '';
            html += `<div class="region-item" data-region="${region}"><div class="region-name"><span>${emoji}</span><span style="${selected?'color:#ff8c00;font-weight:800':''}">${region}${votedMark} ${selected?'✓':''}</span></div><div class="region-percent">${percent}%</div></div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.region-item').forEach(el=>{
            el.addEventListener('click',()=>{
                if(hasVoted) { showToast(`⚠️ Ты уже голосовал за ${votedRegion}!`,true); return; }
                selectedRegion = el.getAttribute('data-region');
                document.getElementById("selectedInfo").innerHTML = `✅ Твой выбор: <strong>${selectedRegion}</strong>`;
                renderRegions();
            });
        });
    }

    async function updateStats() {
        const total = getTotal();
        animateValue(document.getElementById("totalCount"), parseInt(document.getElementById("totalCount").innerText)||0, total, "");
        const top = getTop();
        document.getElementById("topRegionName").innerText = top.name || "—";
        animateValue(document.getElementById("topRegionPercent"), parseInt(document.getElementById("topRegionPercent").innerText)||0, top.percent, "%");
    }

    async function castVote() {
        if(hasVoted) { showToast(`❌ Ты уже голосовал за ${votedRegion}!`,true); return; }
        if(!selectedRegion) { showToast("🌾 Сначала выбери город!",true); return; }
        if(!currentUser.id) { showToast("⚠️ Ошибка идентификации пользователя",true); return; }
        
        const btn = document.getElementById("voteBtn");
        btn.disabled=true; btn.classList.add('disabled');
        try {
            await sendVoteToSheet(selectedRegion);
            votesData[selectedRegion]++;
            hasVoted=true; votedRegion=selectedRegion;
            
            // Сохраняем голос, привязанный к уникальному ID
            localStorage.setItem(`vote_${currentUser.id}`, JSON.stringify({ 
                region: selectedRegion, 
                timestamp: Date.now(),
                userId: currentUser.id
            }));
            
            renderRegions(); await updateStats();
            showToast(`🎉 Спасибо! Твой голос за ${selectedRegion} учтён!`, false);
            document.getElementById("selectedInfo").innerHTML = `✨ Ты проголосовал за ${selectedRegion} ✨`;
            document.getElementById("selectedInfo").classList.add('already-voted');
            selectedRegion=null; renderRegions();
        } catch(e) { 
            showToast(e.message || "Ошибка при отправке голоса", true); 
        }
        finally { btn.disabled=false; btn.classList.remove('disabled'); }
    }

    async function init() {
        await getUserInfo();
        document.getElementById("regionsList").innerHTML='<div class="loading">📡 Загрузка...</div>';
        await loadVotesFromSheet();
        renderRegions(); updateStats();
        document.getElementById("searchInput").addEventListener("input", e=>{ currentSearchQuery=e.target.value; renderRegions(); });
        document.getElementById("searchClearBtn").addEventListener("click", ()=>{ document.getElementById("searchInput").value=""; currentSearchQuery=""; renderRegions(); });
        document.getElementById("voteBtn").addEventListener("click", castVote);
    }
    init();
    if(window.vkBridge) window.vkBridge.send("VKWebAppInit").catch(e=>console.log("VK не инициализирован"));

    // Тёмная тема
    const themeToggle = document.getElementById('themeToggle');
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        themeToggle.innerText = document.body.classList.contains('dark') ? '☀️ Светлая' : '🌙 Тёмная';
    });
    themeToggle.innerText = document.body.classList.contains('dark') ? '☀️ Светлая' : '🌙 Тёмная';

    for(let i=0;i<20;i++){let p=document.createElement('div');p.classList.add('particle');let s=Math.random()*100+30;p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';p.style.bottom='-'+Math.random()*40+'px';p.style.animationDuration=Math.random()*10+6+'s';p.style.animationDelay=Math.random()*8+'s';document.body.appendChild(p);}
</script>
</body>
</html>
